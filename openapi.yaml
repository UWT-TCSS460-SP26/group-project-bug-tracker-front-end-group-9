openapi: 3.0.3
info:
    title: TCSS 460 Group Project API
    description: |
        **Team:** Team 9
        **Deployed URL:** https://tcss460-team-9-api-72a4ffcce368.herokuapp.com

        A RESTful API for the TCSS 460 group project.
    version: 0.2.0

servers:
    - url: https://tcss460-team-9-api-72a4ffcce368.herokuapp.com
      description: Production API
    - url: http://localhost:3000
      description: Local development

tags:
    - name: Issues
      description: Bug reports submitted by end users and triaged by admins

paths:
    /issues:
        post:
            tags: [Issues]
            summary: Submit a bug report
            description: |
                Public endpoint, no authentication required. Creates a new issue with
                a default status of `Open`. The optional `reporterEmail` is stored but
                never returned by any public response. The optional `severity` defaults
                to `Minor` when omitted. Clients MUST NOT set `status`, `id`, `createdAt`,
                or `updatedAt` on creation; doing so returns 400.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateIssueRequest'
            responses:
                '201':
                    description: Issue submitted
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [id, message]
                                properties:
                                    id:
                                        type: integer
                                        example: 42
                                    message:
                                        type: string
                                        example: Issue submitted successfully
                '400':
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to create issue
        get:
            tags: [Issues]
            summary: List all issues (admin)
            description: |
                Admin-only. Returns every issue including the `reporterEmail` field so
                admins can follow up on bug reports during triage. Sorted newest first.
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: Array of issues with admin fields included
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/IssueAdmin'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is not an admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to fetch issues

    /issues/{id}:
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: Issue ID
        get:
            tags: [Issues]
            summary: Get an issue by ID (admin)
            description: Admin-only. Returns the full issue including `reporterEmail`.
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: Issue found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/IssueAdmin'
                '400':
                    description: Invalid issue ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is not an admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: Issue not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to fetch issue
        patch:
            tags: [Issues]
            summary: Update an issue's status or severity (admin)
            description: |
                Admin-only. Accepts a partial body containing `status`, `severity`, or
                both. At least one field must be provided; an empty body returns 400.
                Unknown fields are rejected with 400.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateIssueRequest'
            responses:
                '200':
                    description: Issue updated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/IssueAdmin'
                '400':
                    description: Validation failed (empty body, unknown field, or invalid enum value)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is not an admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: Issue not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to update issue
        delete:
            tags: [Issues]
            summary: Delete an issue (admin)
            description: Admin-only. Permanently removes the issue.
            security:
                - bearerAuth: []
            responses:
                '204':
                    description: Issue deleted
                '400':
                    description: Invalid issue ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is not an admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: Issue not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to delete issue

# ── Schemas ───────────────────────────────────────────────────

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    schemas:
        Issue:
            type: object
            description: Public-facing issue shape. `reporterEmail` is intentionally omitted.
            required: [id, title, description, severity, status, createdAt, updatedAt]
            properties:
                id:
                    type: integer
                    example: 42
                title:
                    type: string
                    example: Login broken on Safari
                description:
                    type: string
                    example: Pressing the login button does nothing on Safari 17.4.
                severity:
                    type: string
                    enum: [Minor, Major, Critical]
                    example: Major
                status:
                    type: string
                    enum: [Open, InProgress, Resolved, Closed]
                    example: Open
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-05-10T14:00:00.000Z
                updatedAt:
                    type: string
                    format: date-time
                    example: 2026-05-10T14:00:00.000Z

        IssueAdmin:
            type: object
            description: |
                Admin-only issue shape. Includes the public `Issue` fields plus
                `reporterEmail` so admins can follow up on bug reports during triage.
            required: [id, title, description, severity, status, createdAt, updatedAt]
            properties:
                id:
                    type: integer
                    example: 42
                title:
                    type: string
                    example: Login broken on Safari
                description:
                    type: string
                    example: Pressing the login button does nothing on Safari 17.4.
                severity:
                    type: string
                    enum: [Minor, Major, Critical]
                    example: Major
                status:
                    type: string
                    enum: [Open, InProgress, Resolved, Closed]
                    example: Open
                reporterEmail:
                    type: string
                    format: email
                    nullable: true
                    example: reporter@example.com
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-05-10T14:00:00.000Z
                updatedAt:
                    type: string
                    format: date-time
                    example: 2026-05-10T14:00:00.000Z

        CreateIssueRequest:
            type: object
            required: [title, description]
            properties:
                title:
                    type: string
                    minLength: 1
                    maxLength: 255
                    example: Login broken on Safari
                description:
                    type: string
                    minLength: 1
                    maxLength: 5000
                    example: Pressing the login button does nothing on Safari 17.4.
                reporterEmail:
                    type: string
                    format: email
                    nullable: true
                    example: reporter@example.com
                severity:
                    type: string
                    enum: [Minor, Major, Critical]
                    default: Minor
                    example: Major

        UpdateIssueRequest:
            type: object
            description: |
                At least one of `status` or `severity` must be supplied. Unknown fields
                are rejected with 400.
            minProperties: 1
            additionalProperties: false
            properties:
                status:
                    type: string
                    enum: [Open, InProgress, Resolved, Closed]
                    example: Resolved
                severity:
                    type: string
                    enum: [Minor, Major, Critical]
                    example: Critical